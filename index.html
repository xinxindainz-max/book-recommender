<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="戴欣的认知书架">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>戴欣的认知书架</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#F7F8FA;color:#1a1d28;max-width:480px;margin:0 auto;padding:32px 20px 48px;
  line-height:1.6;-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

/* ——— 标题 ——— */
.hed{font-family:"Noto Serif SC","Source Han Serif SC",Georgia,"STSong",serif}
.hed h1{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.hed p{font-size:14px;color:#6b7187;font-family:-apple-system,"PingFang SC",sans-serif}

/* ——— 选择区 ——— */
.sec{margin-top:28px}
.sec-label{font-size:11px;color:#8b91a3;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{
  padding:8px 18px;border-radius:22px;font-size:14px;
  border:1px solid #dde0e8;background:#fff;color:#1a1d28;
  cursor:pointer;transition:all .15s;user-select:none;
  font-family:inherit;
}
.pill:active{transform:scale(.96)}
.pill.on{background:#1a1d28;color:#fff;border-color:#1a1d28}

/* ——— 卡片 ——— */
.cards{margin-top:24px;display:flex;flex-direction:column;gap:12px}
.card{
  background:#fff;border-radius:14px;padding:20px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.03);
  border:1px solid #eef0f5;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card h3{font-family:"Noto Serif SC","Source Han Serif SC",Georgia,"STSong",serif;font-size:17px;font-weight:700;line-height:1.3}
.card .tag{font-size:11px;background:#f0f2f8;color:#6b7187;padding:3px 10px;border-radius:4px;white-space:nowrap;font-family:inherit}
.card .meta{font-size:13px;color:#6b7187;margin-bottom:10px}
.card .reason{font-size:13px;color:#4a5064;line-height:1.6;margin-bottom:14px;padding-left:12px;border-left:2px solid #c43e2c}
.card .acts{display:flex;gap:8px}
.btn{flex:1;padding:9px 0;border-radius:8px;font-size:13px;text-align:center;cursor:pointer;border:none;
  transition:all .15s;user-select:none;font-family:inherit;}
.btn:active{transform:scale(.97)}
.btn-skip{background:#1a1d28;color:#fff}
.btn-mark{background:#f0f2f8;color:#4a5064}
.btn-mark.done{background:#e8f5e9;color:#2e7d32}

/* ——— 空态 ——— */
.empty{text-align:center;padding:48px 16px;color:#8b91a3;font-size:14px}
.empty b{color:#1a1d28}

/* ——— toast ——— */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1a1d28;color:#fff;
  padding:10px 24px;border-radius:20px;font-size:13px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* ——— 阶段指标 ——— */
.stages{display:flex;justify-content:space-between;margin-top:32px;padding-top:24px;
  border-top:1px solid #e6e9f0;gap:4px}
.stage{flex:1;text-align:center}
.stage-dot{width:8px;height:8px;border-radius:50%;margin:0 auto 6px}
.stage:nth-child(1) .stage-dot{background:#cbd5e1}
.stage:nth-child(2) .stage-dot{background:#94a3b8}
.stage:nth-child(3) .stage-dot{background:#64748b}
.stage:nth-child(4) .stage-dot{background:#1a1d28}
.stage-name{font-size:11px;color:#8b91a3;font-family:inherit}
</style>
</head>
<body>

<header class="hed">
  <h1>下一本，<br>读什么？</h1>
  <p>按认知问题组织，不是按学科分类</p>
</header>

<div class="sec">
  <div class="sec-label">认知领域</div>
  <div class="pills" id="cats"></div>
</div>

<div class="sec">
  <div class="sec-label">阅读阶段</div>
  <div class="pills" id="scenes"></div>
</div>

<div class="cards" id="results"></div>

<div class="toast" id="toast"></div>

<footer class="stages">
  <div class="stage"><div class="stage-dot"></div><div class="stage-name">搭建世界观</div></div>
  <div class="stage"><div class="stage-dot"></div><div class="stage-name">提升能力</div></div>
  <div class="stage"><div class="stage-dot"></div><div class="stage-name">深入学科</div></div>
  <div class="stage"><div class="stage-dot"></div><div class="stage-name">文明探索</div></div>
</footer>

<script>
const CATS = ['文学·世界经典','中国古典与思想','哲学','历史与文明','经济与商业','心理学与行为','科学','社会与政治'];
const STAGES = ['入门','进阶','深耕','通识'];

let selCat = null, selStage = null;
const readIds = new Set(JSON.parse(localStorage.getItem('readBooks')||'[]'));

function renderPills(ctr, items, sel){
  ctr.innerHTML = items.map(v=>`<span class="pill${sel===v?' on':''}" data-v="${v}">${v}</span>`).join('');
}

function renderPlaceholder(){
  const c = document.getElementById('results');
  const n = selCat||selStage ? 3 : 0;
  const demo = [
    {t:'示例书目',a:'作者 · 领域',r:'选择领域和阶段后，这里会显示匹配的书。每本书都有豆瓣评分和为什么值得读——不是抄简介，是真读过的判断。',score:'9.2'},
    {t:'第二本书',a:'另一位作者 · 领域',r:'认知成长不是囤书单。这里的每一条推荐都在回答同一个问题：读完这本，你的认知会往哪个方向移动。',score:'8.7'},
    {t:'第三本书',a:'第三位作者 · 领域',r:'你可以标记"读过"或"跳过"。跳过的不会消失——只是退到后面，等你准备好了再出现。',score:'8.3'}
  ];
  if(!n){c.innerHTML='<div class="empty">选择领域和阶段后<br>这里会出现三本推荐</div>';return}
  c.innerHTML = demo.slice(0,n).map((b,i)=>`
    <div class="card">
      <div class="card-top"><h3>${b.t}</h3><span class="tag">豆瓣 ${b.score}</span></div>
      <div class="meta">${b.a}</div>
      <div class="reason">${b.r}</div>
      <div class="acts">
        <button class="btn btn-mark${readIds.has(i)?' done':''}" data-id="${i}">${readIds.has(i)?'✓ 已读':'读过了'}</button>
        <button class="btn btn-skip" data-id="${i}">跳过</button>
      </div>
    </div>
  `).join('');
  c.querySelectorAll('.btn-mark').forEach(b=>b.onclick=()=>{
    const id=parseInt(b.dataset.id);readIds.add(id);
    localStorage.setItem('readBooks',JSON.stringify([...readIds]));
    toast('标记已读');renderPlaceholder();
  });
  c.querySelectorAll('.btn-skip').forEach(b=>b.onclick=()=>{
    const id=parseInt(b.dataset.id);readIds.add(id);
    localStorage.setItem('readBooks',JSON.stringify([...readIds]));
    toast('已跳过');renderPlaceholder();
  });
}

function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1500);
}

document.getElementById('cats').onclick=e=>{
  if(!e.target.classList.contains('pill'))return;
  selCat = selCat===e.target.dataset.v ? null : e.target.dataset.v;
  renderPills(document.getElementById('cats'),CATS,selCat);
  renderPlaceholder();
};
document.getElementById('scenes').onclick=e=>{
  if(!e.target.classList.contains('pill'))return;
  selStage = selStage===e.target.dataset.v ? null : e.target.dataset.v;
  renderPills(document.getElementById('scenes'),STAGES,selStage);
  renderPlaceholder();
};

renderPills(document.getElementById('cats'),CATS,selCat);
renderPills(document.getElementById('scenes'),STAGES,selStage);
renderPlaceholder();
</script>
</body>
</html>
