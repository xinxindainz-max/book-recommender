<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="戴欣的认知书架">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>戴欣的认知书架</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#FBFBFD;color:#1D1D1F;max-width:480px;margin:0 auto;
  padding:48px 24px 56px;line-height:1.5;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

/* ——— Hero ——— */
.hero{margin-bottom:40px}
.hero h1{font-size:34px;font-weight:700;letter-spacing:-.8px;line-height:1.15;margin-bottom:8px}
.hero p{font-size:16px;color:#86868B;font-weight:400;letter-spacing:-.2px}

/* ——— Section ——— */
.sec{margin-bottom:32px}
.sec-label{font-size:13px;color:#86868B;font-weight:500;letter-spacing:0;margin-bottom:12px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{
  padding:9px 20px;border-radius:20px;font-size:14px;font-weight:500;
  background:#F2F2F7;color:#1D1D1F;border:none;
  cursor:pointer;transition:all .18s ease;user-select:none;
  letter-spacing:-.2px;
}
.pill:active{transform:scale(.96)}
.pill.on{background:#1D1D1F;color:#FBFBFD}

/* ——— Cards ——— */
.cards{margin-top:36px;display:flex;flex-direction:column;gap:16px}
.card{
  background:#FFFFFF;border-radius:16px;padding:24px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.03);
  transition:opacity .35s ease,transform .35s ease;
}
.card.fade-in{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card h3{font-size:19px;font-weight:600;letter-spacing:-.3px;line-height:1.3}
.card .score{font-size:13px;font-weight:500;color:#E8533F;background:#FFF5F3;padding:3px 10px;border-radius:12px;white-space:nowrap}
.card .meta{font-size:14px;color:#86868B;margin-bottom:12px;letter-spacing:-.1px}
.card .reason{font-size:14px;color:#515154;line-height:1.65;margin-bottom:16px;padding-left:14px;border-left:2.5px solid #E8533F}
.card .acts{display:flex;gap:10px}
.btn{flex:1;padding:11px 0;border-radius:12px;font-size:14px;font-weight:500;text-align:center;
  cursor:pointer;border:none;transition:all .15s ease;user-select:none;letter-spacing:-.2px}
.btn:active{transform:scale(.97)}
.btn-skip{background:#1D1D1F;color:#FBFBFD}
.btn-mark{background:#F2F2F7;color:#515154}
.btn-mark.done{background:#E8F5E9;color:#2E7D32}

/* ——— Empty ——— */
.empty{text-align:center;padding:56px 16px;color:#86868B;font-size:15px;line-height:1.7}
.empty b{color:#1D1D1F;font-weight:600}

/* ——— Toast ——— */
.toast{position:fixed;top:28px;left:50%;transform:translateX(-50%);background:#1D1D1F;color:#FBFBFD;
  padding:11px 28px;border-radius:24px;font-size:14px;font-weight:500;z-index:99;
  opacity:0;transition:opacity .25s;pointer-events:none;letter-spacing:-.2px}
.toast.show{opacity:1}

/* ——— Stage indicator ——— */
.stages{display:flex;margin-top:44px;padding-top:28px;border-top:1px solid #E5E5EA}
.stage{flex:1;text-align:center}
.stage-bar{height:4px;border-radius:2px;margin:0 4px 8px}
.stage:nth-child(1) .stage-bar{background:#E5E5EA}
.stage:nth-child(2) .stage-bar{background:#C7C7CC}
.stage:nth-child(3) .stage-bar{background:#8E8E93}
.stage:nth-child(4) .stage-bar{background:#1D1D1F}
.stage-label{font-size:12px;color:#8E8E93;font-weight:500}
</style>
</head>
<body>

<header class="hero">
  <h1>下一本，<br>读什么？</h1>
  <p>按认知问题组织，不按学科分类</p>
</header>

<div class="sec">
  <div class="sec-label">认知领域</div>
  <div class="pills" id="cats"></div>
</div>

<div class="sec">
  <div class="sec-label">阅读阶段</div>
  <div class="pills" id="stages"></div>
</div>

<div class="cards" id="results"></div>
<div class="toast" id="toast"></div>

<footer class="stages">
  <div class="stage"><div class="stage-bar"></div><div class="stage-label">搭建世界观</div></div>
  <div class="stage"><div class="stage-bar"></div><div class="stage-label">提升能力</div></div>
  <div class="stage"><div class="stage-bar"></div><div class="stage-label">深入学科</div></div>
  <div class="stage"><div class="stage-bar"></div><div class="stage-label">文明探索</div></div>
</footer>

<script src="books-data.js"></script>
<script>
// ========== 数据 & 映射 ==========
const CAT_MAP = {
  '文学':'文学','科幻':'科幻','历史':'历史','哲学':'哲学',
  '经济':'经济','心理学':'心理学','科学':'科学','扩展':'综合'
};
const DIFF_MAP = {1:'入门',2:'入门',3:'进阶',4:'深耕',5:'通识'};

const CATS = [...new Set(BOOKS.map(b=>CAT_MAP[b[2]]||b[2]))];
const STAGES = ['入门','进阶','深耕','通识'];

// ========== 状态 ==========
let selCat = null, selStage = null;
const readIds = new Set(JSON.parse(localStorage.getItem('rb2')||'[]'));

// ========== 渲染 ==========
function renderPills(ctr, items, sel){
  ctr.innerHTML = items.map(v=>`<span class="pill${sel===v?' on':''}" data-v="${v}">${v}</span>`).join('');
}

function renderResults(){
  const c = document.getElementById('results');
  let pool = BOOKS.map((b,i)=>({i,...b})).filter(b=>{
    const catLabel = CAT_MAP[b[2]]||b[2];
    if(selCat && catLabel!==selCat) return false;
    if(selStage){
      const diffLabel = DIFF_MAP[b[4]]||'进阶';
      if(diffLabel!==selStage) return false;
    }
    return true;
  });
  if(!pool.length){pool=BOOKS.map((b,i)=>({i,...b}));} // fallback
  let candidates = pool.filter(b=>!readIds.has(b.i));
  if(!candidates.length) candidates = pool;
  // 随机取3，优先高分
  candidates.sort((a,b)=>b[3]-a[3]||Math.random()-.5);
  const top = candidates.slice(0,3);

  if(!top.length){
    c.innerHTML='<div class="empty"><b>没有匹配的书</b><br>换个条件试试</div>';
    return;
  }
  c.innerHTML = top.map((b,idx)=>{
    const catLabel = CAT_MAP[b[2]]||b[2];
    const diffLabel = DIFF_MAP[b[4]]||'进阶';
    const reason = b[5]>=5
      ? '这个领域的基石之作。不读这本，对整个领域的理解会缺一个角。'
      : b[3]>=9.0
        ? `豆瓣 ${b[3]} 分，读者用脚投票的选择。经得起时间考验。`
        : `难度 ${b[4]}/5 · 值得花时间的一本。读懂它，认知会往深处挪一步。`;
    return `<div class="card fade-in" style="animation-delay:${idx*0.08}s">
      <div class="card-head"><h3>${b[0]}</h3><span class="score">★ ${b[3]}</span></div>
      <div class="meta">${b[1]} · ${catLabel} · ${diffLabel}</div>
      <div class="reason">${reason}</div>
      <div class="acts">
        <button class="btn btn-mark${readIds.has(b.i)?' done':''}" data-id="${b.i}">${readIds.has(b.i)?'✓ 已读':'读过了'}</button>
        <button class="btn btn-skip" data-id="${b.i}">跳过</button>
      </div>
    </div>`;
  }).join('');

  // 事件绑定
  c.querySelectorAll('.btn-mark').forEach(btn=>{
    btn.onclick=()=>{
      const id=parseInt(btn.dataset.id);readIds.add(id);
      localStorage.setItem('rb2',JSON.stringify([...readIds]));
      toast('已标记 ✓');renderResults();
    };
  });
  c.querySelectorAll('.btn-skip').forEach(btn=>{
    btn.onclick=()=>{
      const id=parseInt(btn.dataset.id);readIds.add(id);
      localStorage.setItem('rb2',JSON.stringify([...readIds]));
      toast('已跳过 →');renderResults();
    };
  });
}

function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1600);
}

// ========== 初始化 ==========
document.getElementById('cats').onclick=e=>{
  if(!e.target.classList.contains('pill'))return;
  selCat=selCat===e.target.dataset.v?null:e.target.dataset.v;
  renderPills(document.getElementById('cats'),CATS,selCat);
  renderResults();
};
document.getElementById('stages').onclick=e=>{
  if(!e.target.classList.contains('pill'))return;
  selStage=selStage===e.target.dataset.v?null:e.target.dataset.v;
  renderPills(document.getElementById('stages'),STAGES,selStage);
  renderResults();
};

renderPills(document.getElementById('cats'),CATS,selCat);
renderPills(document.getElementById('stages'),STAGES,selStage);
renderResults();
</script>
</body>
</html>
