<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>戴欣的私人书架</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#FBF9F4;color:#1C1917;max-width:480px;margin:0 auto;
  padding:40px 24px 56px;line-height:1.6;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

/* ====== 标题 ====== */
.hed{margin-bottom:12px}
.hed h1{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;font-size:30px;font-weight:700;letter-spacing:0;line-height:1.25}
.hed .sub{font-size:14px;color:#5C554D;margin-top:6px}

/* ====== 路径选择卡片（书脊式） ====== */
.path-list{display:flex;flex-direction:column;gap:10px;margin:28px 0}
.path-card{display:flex;border-radius:3px;overflow:hidden;background:#FEFDFA;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 6px rgba(0,0,0,.03);
  cursor:pointer;transition:all .2s ease;user-select:none;min-height:72px}
.path-card:active{transform:translateX(3px);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.path-card.disabled{opacity:.45;cursor:default;pointer-events:none}
.path-strip{width:6px;flex-shrink:0}
.path-body{flex:1;padding:16px 20px;display:flex;flex-direction:column;justify-content:center}
.path-body h3{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;font-size:18px;font-weight:600;letter-spacing:0}
.path-body .desc{font-size:13px;color:#5C554D;margin-top:2px}
.path-tag{font-size:11px;color:#8B8580;margin-top:4px}

/* ====== 标尺书区域 ====== */
.ruler-intro{font-size:14px;color:#5C554D;line-height:1.7;margin-bottom:20px}
.ruler-intro strong{color:#1C1917}
.ruler-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ruler-item{display:flex;align-items:stretch;background:#FEFDFA;border-radius:3px;
  overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:all .15s ease}
.ruler-strip{width:4px;flex-shrink:0;background:#D9D4CD;transition:background .2s}
.ruler-item.selected .ruler-strip{background:#9B2D26}
.ruler-body{flex:1;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ruler-check{width:22px;height:22px;border-radius:50%;border:2px solid #C7C0B8;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ruler-item.selected .ruler-check{background:#9B2D26;border-color:#9B2D26}
.ruler-item.selected .ruler-check::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.ruler-info{flex:1;min-width:0}
.ruler-info .b-title{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;font-size:16px;font-weight:600}
.ruler-info .b-author{font-size:12px;color:#8B8580}
.ruler-diff{font-size:11px;color:#8B8580;white-space:nowrap}

.ruler-action{margin-bottom:24px}
.ruler-hint{font-size:12px;color:#8B8580;text-align:center;margin-bottom:12px}

/* ====== 按钮 ====== */
.btn{display:block;width:100%;padding:13px 0;border-radius:6px;font-size:15px;font-weight:600;
  text-align:center;cursor:pointer;border:none;transition:all .15s ease;user-select:none;
  font-family:inherit;letter-spacing:.3px}
.btn:active{transform:scale(.98)}
.btn-primary{background:#1C1917;color:#FBF9F4}
.btn-outline{background:transparent;color:#1C1917;border:1.5px solid #C7C0B8;margin-top:8px}

/* ====== 推荐结果 ====== */
.result-card{background:#FEFDFA;border-radius:3px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);margin-bottom:20px;
  animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-strip{height:6px}
.result-body{padding:24px}
.result-body h2{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;font-size:22px;font-weight:700;margin-bottom:4px}
.result-body .meta{font-size:13px;color:#8B8580;margin-bottom:14px}
.result-body .reason{font-size:14px;color:#3A3530;line-height:1.75;margin-bottom:20px;
  padding-left:14px;border-left:2.5px solid #9B2D26}
.result-acts{display:flex;flex-direction:column;gap:8px}
.level-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:3px;
  letter-spacing:.5px}
.level-badge.l1{background:#F0EDE8;color:#6B5E4F}
.level-badge.l2{background:#E8E2D9;color:#4A3F35}
.level-badge.l3{background:#D4C8B8;color:#2A1F15}

/* ====== 节奏控制（读后两个按钮） ====== */
.pace-box{background:#FEFDFA;border-radius:3px;padding:20px 24px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);margin-top:16px}
.pace-box .pace-q{font-size:15px;font-weight:600;margin-bottom:14px}
.pace-btns{display:flex;flex-direction:column;gap:8px}

/* ====== 返回 ====== */
.back{font-size:13px;color:#5C554D;cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  margin-bottom:20px;user-select:none}
.back:hover{color:#1C1917}

/* ====== Toast ====== */
.toast{position:fixed;top:28px;left:50%;transform:translateX(-50%);background:#1C1917;color:#FBF9F4;
  padding:11px 24px;border-radius:6px;font-size:13px;font-weight:500;z-index:99;
  opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* ====== 分割线 ====== */
.divider{height:1px;background:#E8E4DB;margin:32px 0}

/* ====== 空态 ====== */
.done-msg{text-align:center;padding:32px 16px}
.done-msg .icon{font-size:40px;margin-bottom:12px}
.done-msg p{font-size:14px;color:#5C554D;line-height:1.7}
</style>
</head>
<body>

<div class="hed"><h1>戴欣的<br>私人书架</h1><p class="sub">四条阅读路径，一人带路</p></div>

<!-- 动态内容区 -->
<div id="view"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 数据：价值投资路径
// ============================================================
const PATHS = {
  'value': {
    id:'value',
    name:'价值投资',
    desc:'正统巴芒派，从《小狗钱钱》到《证券分析》',
    color:'#9B2D26',
    label:'入门→进阶→硬核',
    rulerBooks:[
      {id:'vr1',title:'小狗钱钱',author:'博多·舍费尔',diff:1,
        reason:'用故事讲钱，小孩都能看懂。读完你会开始想"我的钱现在在干什么"。'},
      {id:'vr2',title:'富爸爸穷爸爸',author:'罗伯特·清崎',diff:1,
        reason:'换一个脑子想钱。资产vs负债那一章就值回时间——很多人一辈子分不清这两样。'},
      {id:'vr3',title:'投资中最简单的事',author:'邱国鹭',diff:2,
        reason:'中国人写的最干净的价值投资入门。接地气，没一句黑话。读完你知道买股票到底在买什么。'},
      {id:'vr4',title:'聪明的投资者',author:'本杰明·格雷厄姆',diff:3,
        reason:'巴菲特的老师写的。不用全读，第八章"市场先生"和第20章够你用一辈子。比《证券分析》好读太多。'},
      {id:'vr5',title:'证券分析',author:'格雷厄姆 / 多德',diff:5,
        reason:'硬核经典。不要一上来就读——等前面几本读完，觉得准备好了，再翻开它。它会等你。'},
    ],
    pathBooks:[
      {id:'vp1',title:'小狗钱钱',author:'博多·舍费尔',level:1,seq:1,
        reason:'最好的起点。用一个12岁女孩的理财故事，把"钱"这件事讲得既简单又有温度。读完你会开始记账——不是因为有人逼你，是你自己想。好读、有获得感。'},
      {id:'vp2',title:'富爸爸穷爸爸',author:'罗伯特·清崎',level:1,seq:2,
        reason:'小狗钱钱讲习惯，这本讲观念。两个爸爸对比会逼你重新想：工作赚钱和让钱为你工作，是两件完全不同的事。一周能读完。'},
      {id:'vp3',title:'穷查理宝典',author:'彼得·考夫曼',level:1,seq:3,
        reason:'芒格一辈子智慧的合集。不是教你赚钱，是教你怎么不犯傻。"反过来想，永远反过来想"——这句话读完就忘不掉。随时翻开哪页都能读。'},
      {id:'vp4',title:'投资中最简单的事',author:'邱国鹭',level:2,seq:4,
        reason:'从这本开始，你正式踏入价值投资。邱国鹭把格雷厄姆和巴菲特那套用中国人的话说了一遍，好读、不装。读完你会理解"好公司+好价格"六个字的分量。'},
      {id:'vp5',title:'聪明的投资者',author:'本杰明·格雷厄姆',level:2,seq:5,
        reason:'到这本了。不用怕——挑重点章节读：第八章"市场先生"和第二十章"安全边际"。市场先生的比喻会让你从此不再被K线吓到。这本偏厚，但值得慢慢啃。'},
      {id:'vp6',title:'巴菲特致股东的信',author:'沃伦·巴菲特',level:2,seq:6,
        reason:'原汁原味的巴菲特，比任何二手解读都值得看。看他怎么想、怎么说、怎么做——读完你会开始读年报的原文，因为他让你觉得读年报是一件有趣的事。'},
      {id:'vp7',title:'证券分析',author:'格雷厄姆 / 多德',level:3,seq:7,
        reason:'你走到这里了。这不是一本好读的书——厚、密、需要静下心慢慢啃。但读完它，你对"价值"二字的理解会和绝大多数投资者完全不同。不是必须读完，但如果你想成为认真的投资者——它等你。'},
    ]
  },
  'china':{
    id:'china',name:'理解中国',desc:'政治·经济·历史，左中右视角多元呈现',
    color:'#3A526B',label:'即将推出',rulerBooks:[],pathBooks:[]
  },
  'philo':{
    id:'philo',name:'哲学与存在',desc:'《悉达多》《西西弗神话》一脉，可读的思想史',
    color:'#3D5C4A',label:'即将推出',rulerBooks:[],pathBooks:[]
  },
  'aesth':{
    id:'aesth',name:'审美',desc:'摄影·诗·美学，戴欣的独特标签',
    color:'#B8944A',label:'即将推出',rulerBooks:[],pathBooks:[]
  }
};

// ============================================================
// 状态管理
// ============================================================
const ST = (()=>{
  const raw = localStorage.getItem('dx_bookshelf');
  if(raw) try{return JSON.parse(raw);}catch(e){}
  return {readIds:[], levels:{}, awaitingPace:false};
})();
function save(){localStorage.setItem('dx_bookshelf',JSON.stringify(ST));}

let currentPath = 'value';
let currentView = 'paths'; // paths | assess | recommend

// ============================================================
// 渲染引擎
// ============================================================
const $ = id=>document.getElementById(id);
const view = ()=>document.getElementById('view');

function render(){
  if(currentView==='paths') renderPaths();
  else if(currentView==='assess') renderAssess();
  else if(currentView==='recommend') renderRecommend();
}
window.addEventListener('popstate',()=>{
  // 简单处理回退
  if(currentView==='assess'){currentView='paths';render();}
  else if(currentView==='recommend'){currentView='assess';render();}
});

// ---- 路径选择 ----
function renderPaths(){
  const cards = Object.values(PATHS).map(p=>{
    const disabled = !p.rulerBooks.length;
    return `<div class="path-card${disabled?' disabled':''}" data-path="${p.id}">
      <div class="path-strip" style="background:${p.color}"></div>
      <div class="path-body">
        <h3>${p.name}</h3>
        <div class="desc">${p.desc}</div>
        <div class="path-tag">${p.label}</div>
      </div>
    </div>`;
  }).join('');
  const hasLevel = ST.levels['value'];
  const savedHint = hasLevel ? `<div class="ruler-hint">你已测过：<strong>${levelLabel(hasLevel)}</strong>　<a style="color:#9B2D26;cursor:pointer" class="reassess-link">重新测</a></div>` : '';

  view().innerHTML = `
    <div class="path-list">${cards}</div>
    ${savedHint}
  `;
  view().querySelectorAll('.path-card:not(.disabled)').forEach(c=>{
    c.onclick=()=>{currentPath=c.dataset.path;currentView='assess';render();window.scrollTo(0,0);};
  });
  const re = view().querySelector('.reassess-link');
  if(re) re.onclick=()=>{currentPath='value';currentView='assess';render();window.scrollTo(0,0);};
}

// ---- 标尺书判定 ----
let assessSelections = new Set();

function renderAssess(){
  const p = PATHS[currentPath];
  const prev = ST.levels[currentPath];
  // 恢复之前的勾选
  assessSelections = new Set();
  view().innerHTML = `
    <div class="back" id="backBtn">← 返回</div>
    <h2 style="font-family:'Noto Serif SC','Songti SC','STSong','SimSun',serif;font-size:22px;font-weight:700;margin-bottom:4px">${p.name}</h2>
    <p class="ruler-intro">这些书从<strong>最易到最难</strong>排列。<br>勾出你<strong>真正读过</strong>的——系统会据此判断你的段位，跳过你已经读过的。</p>
    <div class="ruler-list" id="rulerList"></div>
    <div class="ruler-action">
      ${prev ? '<div class="ruler-hint">上次判定：<strong>'+levelLabel(prev)+'</strong></div>' : ''}
      <button class="btn btn-primary" id="assessBtn">${assessSelections.size ? '测好了，看推荐 →' : '我一都没读过，直接看推荐 →'}</button>
    </div>
  `;
  document.getElementById('backBtn').onclick=()=>{currentView='paths';render();};

  const list = document.getElementById('rulerList');
  p.rulerBooks.forEach(b=>{
    const sel = ST.readIds.includes(b.id) || assessSelections.has(b.id);
    if(ST.readIds.includes(b.id)) assessSelections.add(b.id);
    const diffWord = {1:'☆',2:'☆☆',3:'☆☆☆',5:'☆☆☆☆☆'}[b.diff]||'☆☆';
    const div = document.createElement('div');
    div.className = 'ruler-item'+(sel?' selected':'');
    div.innerHTML = `
      <div class="ruler-strip"></div>
      <div class="ruler-body">
        <div class="ruler-check"></div>
        <div class="ruler-info"><div class="b-title">${b.title}</div><div class="b-author">${b.author}</div></div>
        <div class="ruler-diff">${diffWord}</div>
      </div>
    `;
    div.querySelector('.ruler-body').onclick=()=>{
      const id = b.id;
      if(assessSelections.has(id)){assessSelections.delete(id);}
      else{assessSelections.add(id);}
      // refresh
      renderAssessState();
    };
    list.appendChild(div);
  });
  document.getElementById('assessBtn').onclick=()=>{
    // 判定水平
    const p = PATHS[currentPath];
    let maxDiff = 0;
    assessSelections.forEach(id=>{
      const rb = p.rulerBooks.find(b=>b.id===id);
      if(rb && rb.diff>maxDiff) maxDiff = rb.diff;
    });
    let level;
    if(maxDiff>=4) level='深耕';
    else if(maxDiff>=2) level='进阶';
    else level='入门';

    ST.levels[currentPath] = level;
    // 标记已读
    assessSelections.forEach(id=>{if(!ST.readIds.includes(id)) ST.readIds.push(id);});
    save();
    currentView='recommend';
    render();
    window.scrollTo(0,0);
  };

  function renderAssessState(){
    const items = list.querySelectorAll('.ruler-item');
    items.forEach(item=>{
      const body = item.querySelector('.ruler-body');
      const id = PATHS[currentPath].rulerBooks[[...items].indexOf(item)].id;
      if(assessSelections.has(id)) item.classList.add('selected');
      else item.classList.remove('selected');
    });
    const btn = document.getElementById('assessBtn');
    btn.textContent = assessSelections.size ? '测好了，看推荐 →' : '我一都没读过，直接看推荐 →';
  }
}

// ---- 推荐结果 ----
function renderRecommend(){
  const p = PATHS[currentPath];
  const level = ST.levels[currentPath]||'入门';
  const levelNum = {入门:1,进阶:2,深耕:3}[level];

  // 模式1：等待用户选择方向（刚标记读完一本书）
  if(ST.awaitingPace){
    const sameCount = p.pathBooks.filter(b=>b.level===levelNum && !ST.readIds.includes(b.id)).length;
    const hasDeeper = p.pathBooks.some(b=>b.level>levelNum && !ST.readIds.includes(b.id));
    view().innerHTML = `
      <div class="back" id="backBtn">← 重测水平</div>
      <div style="margin-bottom:12px">
        <span style="font-family:'Noto Serif SC','Songti SC','STSong','SimSun',serif;font-size:20px;font-weight:700">${p.name}</span>
        <span class="level-badge l${levelNum}">${levelLabel(level)}</span>
      </div>
      <div class="result-card"><div class="result-strip" style="background:${p.color}"></div>
        <div class="result-body" style="text-align:center;padding:32px 24px">
          <div style="font-family:'Noto Serif SC','Songti SC','STSong','SimSun',serif;font-size:20px;font-weight:700;margin-bottom:8px">已标记 ✓</div>
          <div style="font-size:14px;color:#5C554D;margin-bottom:24px">下一本，你想怎么走？</div>
          <div class="result-acts">
            ${sameCount>0 ? `<button class="btn btn-outline" id="paceSame">同级别再来几本（还有 ${sameCount} 本）</button>` : ''}
            ${hasDeeper ? `<button class="btn btn-primary" id="paceDeep">我想读更深的 →</button>` : ''}
            ${!sameCount && !hasDeeper ? `<div class="done-msg"><div class="icon">🎉</div><p>这条路径上的书你全部读完了。<br>好样的。</p></div>` : ''}
          </div>
        </div>
      </div>
    `;
    document.getElementById('backBtn').onclick=()=>{ST.awaitingPace=false;save();currentView='assess';render();};
    const sameBtn = document.getElementById('paceSame');
    if(sameBtn) sameBtn.onclick=()=>{ST.awaitingPace=false;save();render();};
    const deepBtn = document.getElementById('paceDeep');
    if(deepBtn) deepBtn.onclick=()=>{
      ST.awaitingPace=false;
      ST.levels[currentPath] = {1:'入门',2:'进阶',3:'深耕'}[Math.min(levelNum+1,3)];
      save();render();
    };
    return;
  }

  // 模式2：推荐下一本
  const candidates = p.pathBooks.filter(b=>!ST.readIds.includes(b.id));
  const sameLevel = candidates.filter(b=>b.level===levelNum);
  const nextBook = sameLevel.length>0 ? sameLevel[0] : (candidates.length>0 ? candidates[0] : null);

  // 当前级别没书了但更深级别有
  const deeperAvailable = !sameLevel.length && candidates.some(b=>b.level>levelNum);

  view().innerHTML = `
    <div class="back" id="backBtn">← 重测水平</div>
    <div style="margin-bottom:16px">
      <span style="font-family:'Noto Serif SC','Songti SC','STSong','SimSun',serif;font-size:20px;font-weight:700">${p.name}</span>
      <span class="level-badge l${levelNum}">${levelLabel(level)}</span>
    </div>
    ${nextBook ? renderBookCard(nextBook, p.color) : renderAllDone(p, levelNum, deeperAvailable)}
  `;

  if(nextBook){
    document.getElementById('markReadBtn').onclick=()=>{
      if(!ST.readIds.includes(nextBook.id)) ST.readIds.push(nextBook.id);
      ST.awaitingPace = true;
      save();render();window.scrollTo(0,0);
    };
    document.getElementById('skipBtn').onclick=()=>{
      if(!ST.readIds.includes(nextBook.id)) ST.readIds.push(nextBook.id);
      save();render();window.scrollTo(0,0);
    };
  }
  if(deeperAvailable && !nextBook){
    const btn = document.getElementById('goDeeperBtn');
    if(btn) btn.onclick=()=>{
      ST.levels[currentPath] = {1:'入门',2:'进阶',3:'深耕'}[Math.min(levelNum+1,3)];
      save();render();
    };
  }
  document.getElementById('backBtn').onclick=()=>{currentView='assess';render();};
}

function renderBookCard(b, color){
  const diffStars = {1:'入门',2:'进阶',3:'深耕'}[b.level]||'';
  return `
    <div class="result-card">
      <div class="result-strip" style="background:${color}"></div>
      <div class="result-body">
        <h2>${b.title}</h2>
        <div class="meta">${b.author} · ${diffStars}</div>
        <div class="reason">${b.reason}</div>
        <div class="result-acts">
          <button class="btn btn-primary" id="markReadBtn">读过了，标记已读</button>
          <button class="btn btn-outline" id="skipBtn">跳过这本</button>
        </div>
      </div>
    </div>
  `;
}

function renderPaceControl(levelNum, p){
  const sameCount = p.pathBooks.filter(b=>b.level===levelNum && !ST.readIds.includes(b.id)).length;
  const hasDeeper = p.pathBooks.some(b=>b.level>levelNum && !ST.readIds.includes(b.id));
  let sameHtml='', deepHtml='';
  if(sameCount>0){
    sameHtml = `<button class="btn btn-outline" id="paceSame">同级别再来几本（还有 ${sameCount} 本未读）</button>`;
  }
  if(hasDeeper){
    deepHtml = `<button class="btn btn-primary" id="paceDeep">我想读更深的 →</button>`;
  }
  if(!sameHtml && !deepHtml) return '';
  return `
    <div class="pace-box">
      <div class="pace-q">下一本，你想怎么走？</div>
      <div class="pace-btns">
        ${sameHtml}
        ${deepHtml}
      </div>
    </div>
  `;
}

function renderAllDone(p, levelNum, deeperAvailable){
  if(deeperAvailable){
    return `
      <div class="done-msg">
        <div class="icon">📚</div>
        <p>当前阶段的书你都读完了。<br>要不要挑战更深的？</p>
        <button class="btn btn-primary" id="goDeeperBtn" style="margin-top:16px">我想读更深的 →</button>
      </div>
    `;
  }
  return `
    <div class="done-msg">
      <div class="icon">🎉</div>
      <p>这条路径上的书你全部读完了。<br>好样的。</p>
    </div>
  `;
}

// ---- 工具 ----
function levelLabel(l){return {入门:'入门',进阶:'进阶',深耕:'深耕'}[l]||l;}
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1800);
}

// ---- 初始化 ----
render();
</script>
</body>
</html>
